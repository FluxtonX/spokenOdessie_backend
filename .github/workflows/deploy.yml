name: Deploy to AWS EC2

on:
  push:
    branches:
      - br/mudassir

jobs:
  deploy:
    name: SSH into EC2 and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.APP_DIR }}
            git fetch origin
            git checkout br/mudassir
            git pull origin br/mudassir
            npm install --production
            pm2 restart all || pm2 start src/server.js --name spoken-odyssey
            pm2 status
